<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin • PhoneOnlyGigs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">🔧 Admin Dashboard</h2>
            <!-- FIX: logout propre, plus de clé dans l'URL -->
            <a href="/admin/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>

        <a href="/" class="btn btn-outline-light mb-4">&larr; Back to public site</a>

        <h4 class="mb-3">All gigs ({{ jobs|length }})</h4>

        {% for job in jobs %}
        <div class="card bg-secondary mb-3">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <!-- FIX: accès par nom grâce à row_factory -->
                        <h5>{{ job['title'] }} <span class="badge bg-primary">{{ job['niche'] }}</span></h5>
                        <p class="text-muted mb-1">{{ job['company'] }} • {{ job['date'] }}</p>
                        <p class="mb-0">{{ job['description'][:120] }}...</p>
                    </div>
                    <div class="ms-3 flex-shrink-0">
                        <!-- FIX: suppression en POST, plus en GET -->
                        <form method="post" action="/delete/{{ job['id'] }}"
                              onsubmit="return confirm('Delete this gig forever?')">
                            <button type="submit" class="btn btn-danger btn-sm">🗑 Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}

        {% if not jobs %}
        <p class="text-center text-muted mt-5">No gigs yet.</p>
        {% endif %}
    </div>
</body>
</html>
