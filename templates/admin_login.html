<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login • PhoneOnlyGigs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex align-items-center" style="min-height:100vh;">
    <div class="container" style="max-width:400px;">
        <h2 class="text-center mb-4">🔧 Admin Login</h2>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" action="/admin/login">
            <div class="mb-3">
                <input type="password" name="key" class="form-control"
                       placeholder="Admin key" required autofocus>
            </div>
            <button type="submit" class="btn btn-success w-100">Login</button>
        </form>

        <p class="text-center mt-4">
            <a href="/" class="text-muted small">← Back to site</a>
        </p>
    </div>
</body>
</html>
