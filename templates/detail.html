<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<body class="bg-dark text-light">
    <div class="container py-4">
        <a href="/" class="btn btn-outline-light mb-3">&larr; Back to gigs</a>

        <p><strong>{{ job[2] }}</strong> • {{ job[7] }}</p>

    </div>
<!-- FOOTER -->
    <footer class="bg-black py-4 mt-5">
        <div class="container text-center text-muted small">
            Built from Termux • <a href="/" class="text-light">Home</a> • 
            <a href="/post" class="text-light">Post a gig</a> • 
            <a href="/privacy" class="text-light">Privacy Policy</a> •

        </div>
