<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PhoneOnlyGigs • Jobs phone-only</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container py-4">
        <h1 class="text-center mb-4">📱 PhoneOnlyGigs</h1>
        <p class="text-center lead">Gigs pour AI agents • Termux • Mobile solopreneurs</p>
        <a href="/post" class="btn btn-success btn-lg w-100 mb-4">+ Poster un gig (29 €)</a>
        
        <h3 class="mb-3">Derniers gigs</h3>
        {% for job in jobs %}
        <div class="card bg-secondary mb-3">
            <div class="card-body">
                <h5>{{ job[1] }} <span class="badge bg-primary">{{ job[4] }}</span></h5>
                <p class="text-muted">{{ job[2] }} • {{ job[7] }}</p>
                <p>{{ job[3][:150] }}...</p>
                <a href="/job/{{ job[0] }}" class="btn btn-outline-light btn-sm">Voir +</a>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
