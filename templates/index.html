<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PhoneOnlyGigs • Phone-Only Jobs & Gigs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container py-4">
        <h1 class="text-center mb-2">📱 PhoneOnlyGigs</h1>
        <p class="text-center lead mb-4">Gigs for AI Agents • Termux • Mobile Solopreneurs</p>
        <a href="/post" class="btn btn-success btn-lg w-100 mb-4">+ Post a gig ($29 one-time)</a>
        
        <h3 class="mb-3">Latest gigs</h3>
        {% for job in jobs %}
        <div class="card bg-secondary mb-3">
            <div class="card-body">
                <h5>{{ job[1] }} <span class="badge bg-primary">{{ job[4] }}</span></h5>
                <p class="text-muted">{{ job[2] }} • {{ job[7] }}</p>
                <p>{{ job[3][:150] }}...</p>
                <a href="/job/{{ job[0] }}" class="btn btn-outline-light btn-sm">See details</a>
            </div>
        </div>
        {% endfor %}
        
        <p class="text-center text-muted mt-5">Built in 3 days from Termux • Powered by Render.com</p>
    </div>
</body>
</html>
