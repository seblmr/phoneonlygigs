<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Poster un gig • PhoneOnlyGigs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container py-4">
        <h2>Poster un gig (29 € une fois live)</h2>
        <form method="post">
            <div class="mb-3"><input type="text" name="title" class="form-control" placeholder="Titre du gig" required></div>
            <div class="mb-3"><input type="text" name="company" class="form-control" placeholder="Ton pseudo / entreprise" required></div>
            <div class="mb-3"><textarea name="description" class="form-control" rows="5" placeholder="Description complète (Python/Termux/AI agent...)" required></textarea></div>
            <div class="mb-3">
                <select name="niche" class="form-select">
                    <option>AI Agent</option>
                    <option>Termux Script</option>
                    <option>Mobile Solopreneur</option>
                    <option>Automation légère</option>
                    <option>Autre phone-only</option>
                </select>
            </div>
            <div class="mb-3"><input type="text" name="budget" class="form-control" placeholder="Budget (ex: 200-500€ ou equity)" required></div>
            <div class="mb-3"><input type="text" name="contact" class="form-control" placeholder="Telegram / email / X" required></div>
            <button type="submit" class="btn btn-success w-100">Poster le gig</button>
        </form>
        <p class="text-center mt-3 text-muted">Paiement Stripe activé dans 48h (version pro)</p>
    </div>
</body>
</html>
